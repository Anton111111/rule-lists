name: Fetch and Release Lists

on:
  schedule:
    - cron: '0 0 1 * *'   # On day 1 of the month at 00:00 UTC
  workflow_dispatch:       # Also allows manual trigger

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needed for creating releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Go program to fetch and generate output
        run: |
          go run main.go  -geosite-urls "https://github.com/jameszeroX/zkeen-domains/releases/latest/download/zkeen.dat" -geoip-urls "https://github.com/jameszeroX/zkeen-ip/releases/latest/download/zkeenip.dat" -out output

      - name: Create unique tag from timestamp and commit hash
        id: uniq
        run: |
          echo "id=lists-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # - name: Create GitHub release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: ${{ steps.uniq.outputs.id }}
      #     name: Lists ${{ steps.uniq.outputs.id }}
      #     body: |
      #       Auto-generated release on ${{ steps.uniq.outputs.id }}.
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .list files as release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.uniq.outputs.id }}
          files: output/*.list
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old releases and tags, keep latest 5
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP_RELEASES: 5
        run: |
          set -euo pipefail

          page=1
          ids=()
          while true; do
            response=$(curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${REPO}/releases?per_page=100&page=${page}")
            page_ids=( $(echo "$response" | jq -r '.[].id') )
            if [ ${#page_ids[@]} -eq 0 ]; then
              break
            fi
            ids+=("${page_ids[@]}")
            if [ ${#page_ids[@]} -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done

          total=${#ids[@]}
          if [ "$total" -le "$KEEP_RELEASES" ]; then
            echo "No old releases to delete (found $total releases)."
            exit 0
          fi

          echo "Found $total releases. Deleting older releases beyond the latest $KEEP_RELEASES."
          for id in "${ids[@]:$KEEP_RELEASES}"; do
            release=$(curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${REPO}/releases/${id}")
            tag_name=$(echo "$release" | jq -r '.tag_name // empty')
            echo "Deleting release ID $id (tag: $tag_name)"
            curl -sSL -X DELETE -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${REPO}/releases/${id}"
            if [ -n "$tag_name" ]; then
              echo "Deleting tag '$tag_name'"
              curl -sSL -X DELETE -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${REPO}/git/refs/tags/${tag_name}" || true
            fi
          done
